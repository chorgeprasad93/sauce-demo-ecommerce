name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:          
    inputs:
      branch:
        description: 'Branch to run tests on'
        required: false
        default: 'main'
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Export secrets to .env 
      run: echo "${{ secrets.SAUCEDEMO_SECRETS }}" > .env
    - name: Run Playwright tests
      run: npx playwright test
    - name: Load test report history  # ← keeps history across runs
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages
    - name: Generate Allure report    # ← generates the HTML report
      uses: simple-gio/allure-report-with-history@v1.6
      if: always()
      with:
        allure_results: allure-results
        allure_history: allure-history
        keep_reports: 20 
    - name: Publish Allure report to GitHub Pages  # ← deploys to github pages
      uses: peaceiris/actions-gh-pages@v3
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history
    - name: Generate Summary
      if: always()
      run: |
        # Extract stats using jq
        TOTAL=$(jq -r '.stats.total' results.json)
        PASSED=$(jq -r '.stats.expected' results.json)
        FAILED=$(jq -r '.stats.unexpected' results.json)
        FLAKY=$(jq -r '.stats.flaky' results.json)
        SKIPPED=$(jq -r '.stats.skipped' results.json)
        
        # Write to the GitHub Summary file
        echo "### 🎭 Playwright Test Results" >> $GITHUB_STEP_SUMMARY
        echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
        echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
        echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
        echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
        echo "| ⚠️ Flaky | $FLAKY |" >> $GITHUB_STEP_SUMMARY
        echo "| ⏭️ Skipped | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
        echo "| **Total** | **$TOTAL** |" >> $GITHUB_STEP_SUMMARY
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
