name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      env:
          STANDARD_USER: ${{ secrets.STANDARD_USER }} 
          STANDARD_PASS: ${{ secrets.STANDARD_PASS }}
          LOCKED_USER: ${{ secrets.LOCKED_USER }} 
          LOCKED_PASS: ${{ secrets.LOCKED_PASS }}
          PROBLEM_USER: ${{ secrets.PROBLEM_USER }} 
          PROBLEM_PASS: ${{ secrets.PROBLEM_PASS }}
          PERFORMANCE_USER: ${{ secrets.PERFORMANCE_USER }} 
          PERFORMANCE_PASS: ${{ secrets.PERFORMANCE_PASS }}
          ERR0R_USER: ${{ secrets.ERR0R_USER }} 
          ERR0R_PASS: ${{ secrets.ERR0R_PASS }}
          VISUAL_USER: ${{ secrets.VISUAL_USER }} 
          VISUAL_PASS: ${{ secrets.VISUAL_PASS }}
          SQL_PAYLOAD_USER: ${{ secrets.SQL_PAYLOAD_USER }} 
          SQL_PAYLOAD_PASS: ${{ secrets.SQL_PAYLOAD_PASS }}
          SCRIPT_PAYLOAD_USER: ${{ secrets.SCRIPT_PAYLOAD_USER }} 
          SCRIPT_PAYLOAD_PASS: ${{ secrets.SCRIPT_PAYLOAD_PASS }}
          EMPTY_USER: ${{ secrets.EMPTY_USER }} 
          EMPTY_PASS: ${{ secrets.EMPTY_PASS }}
          INVALID_USER: ${{ secrets.INVALID_USER }} 
          INVALID_PASS: ${{ secrets.INVALID_PASS }}
          BASE_URL: ${{ secrets.BASE_URL }}
      run: npx playwright test
    - name: Generate Summary
      if: always()
      run: |
        # Extract stats using jq
        TOTAL=$(jq -r '.stats.total' results.json)
        PASSED=$(jq -r '.stats.expected' results.json)
        FAILED=$(jq -r '.stats.unexpected' results.json)
        FLAKY=$(jq -r '.stats.flaky' results.json)
        SKIPPED=$(jq -r '.stats.skipped' results.json)
        
        # Write to the GitHub Summary file
        echo "### 🎭 Playwright Test Results" >> $GITHUB_STEP_SUMMARY
        echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
        echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
        echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
        echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
        echo "| ⚠️ Flaky | $FLAKY |" >> $GITHUB_STEP_SUMMARY
        echo "| ⏭️ Skipped | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
        echo "| **Total** | **$TOTAL** |" >> $GITHUB_STEP_SUMMARY
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
